name = "bodegacat"
compatibility_date = "2026-02-24"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "bodegacat-prod"

[env.staging]
name = "bodegacat-staging"

# Cloudflare Access configuration for admin routes
[[env.production.routes]]
pattern = "/admin/*"
zone_name = "your-domain.com"
custom_domain = true

# Environment variables
[vars]
NODE_ENV = "production"

# KV: admin settings (store name, theme, copy, etc.)
# Create with: wrangler kv namespace create SETTINGS_KV
[[kv_namespaces]]
binding = "SETTINGS_KV"
id = "placeholder-settings-id"
preview_id = "placeholder-settings-preview-id"

# KV: sessions (reserved for future use)
[[kv_namespaces]]
binding = "SESSION"
id = "placeholder-id"
preview_id = "placeholder-preview-id"

# Secrets (set these via wrangler secret put)
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET

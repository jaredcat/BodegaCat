name = "my-store"
compatibility_date = "2026-02-24"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Access configuration for admin routes (optional; set zone to your domain)
# [[env.production.routes]]
# pattern = "/admin/*"
# zone_name = "your-domain.com"
# custom_domain = true

[vars]
NODE_ENV = "production"
# Local wrangler preview only: set BODEGACAT_ADMIN_LOCAL_BYPASS=true in `.dev.vars` (not here) to
# open `/admin` without Cloudflare Access on localhost. Never enable on production.

# KV: admin settings (store name, theme, copy, etc.)
# Create with: wrangler kv namespace create SETTINGS_KV
[[kv_namespaces]]
binding = "SETTINGS_KV"
id = "placeholder-settings-id"
preview_id = "placeholder-settings-preview-id"

# KV: sessions (reserved for future use)
[[kv_namespaces]]
binding = "SESSION"
id = "placeholder-session-id"
preview_id = "placeholder-session-preview-id"

# Secrets (set these via wrangler secret put or the Cloudflare dashboard)
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
